spring:
  application:
    name: planner

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/planner}
    username: ${DATABASE_USERNAME:reaganbourne}
    password: ${DATABASE_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration


server:
  port: ${PORT:8080}
  error:
    include-message: always

jwt:
  secret: ${JWT_SECRET:MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMw==}
  expiration: 86400000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

nominatim:
  base-url: https://nominatim.openstreetmap.org
  email: ${NOMINATIM_EMAIL:}
  user-agent: planner-app/0.1
